<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Navigation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="nav_main">
        <div class="logo">
            <h1>Logo</h1>
        </div>

        <input type="checkbox" id="check">
        <label for="check" class="checkbtn">
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
        </label>

        <div class="menu">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Service</a>
            <a href="#">Teams</a>
            
            <div class="mobile_btns">
                <button type="button" class="login_btn">Login</button>
                <button type="button" class="register_btn">Register</button>
            </div>
        </div>

        <div class="desktop_btns">
            <button type="button" class="login_btn">Login</button>
            <button type="button" class="register_btn">Register</button>
        </div>
    </nav>

    <div style="padding: 20px; color: white;">
        <h2>Welcome to our website</h2>
        <p>Resize the window to see the responsive effect!</p>
    </div>

</body>
</html>
